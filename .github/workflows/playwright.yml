name: Playwright Tests — Portal de Chamados

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      run_ui_tests:
        description: Run UI tests against Portal environment
        required: false
        default: false
        type: boolean

jobs:
  api-tests:
    name: Run Playwright API Tests
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Node.js setup
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # npm ci respects package-lock.json exactly — reproducible installs
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 4. Install Playwright browsers
      # -----------------------------------------------------------------------
      - name: Install Playwright browsers
        run: npx playwright install chromium

      # -----------------------------------------------------------------------
      # 5. Run API suite
      # PRs run smoke for fast feedback; push/manual run full API suite.
      # Secrets are injected as env vars — never hardcoded in source
      # -----------------------------------------------------------------------
      - name: Run API tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run test:api:smoke
          else
            npm run test:api:full
          fi
        env:
          CI: true
          MASTER_EMAIL: ${{ secrets.MASTER_EMAIL }}
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
          API_BASE: ${{ secrets.API_BASE }}

      # -----------------------------------------------------------------------
      # 6. Upload HTML report
      # always() ensures upload even when tests fail — report is the evidence
      # -----------------------------------------------------------------------
      - name: Upload Playwright HTML report (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

      # -----------------------------------------------------------------------
      # 7. Upload JUnit XML results (one file per browser)
      # Allows GitHub to surface per-test results natively in the PR checks UI
      # -----------------------------------------------------------------------
      - name: Upload JUnit test results (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test-results/
          retention-days: 30

      # -----------------------------------------------------------------------
      # 8. Upload screenshots and videos (evidence for failed tests)
      # -----------------------------------------------------------------------
      - name: Upload screenshots (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-api
          path: screenshots/
          retention-days: 30

      - name: Upload videos (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-api
          path: videos/
          retention-days: 30

      # Optional UI execution is isolated because the external Portal host
      # can be inaccessible from GitHub-hosted runners.
  ui-tests:
    name: Run Playwright UI Tests (manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ui_tests }}
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    env:
      PORTAL_BASE_URL: ${{ vars.PORTAL_BASE_URL || 'https://portal-chamados-dev.t-upsolucoes.net.br' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Check Portal reachability from runner
        id: portal_check
        run: |
          if curl --fail --silent --show-error --max-time 20 "$PORTAL_BASE_URL/login" > /dev/null; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip UI tests (Portal unreachable)
        if: steps.portal_check.outputs.reachable != 'true'
        run: echo "Portal is unreachable from this GitHub runner. Skipping UI tests by design."

      - name: Run UI tests
        if: steps.portal_check.outputs.reachable == 'true'
        run: npm run test:ui:portal
        env:
          CI: true
          MASTER_EMAIL: ${{ secrets.MASTER_EMAIL }}
          MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}
          API_BASE: ${{ secrets.API_BASE }}

      # -----------------------------------------------------------------------
      # 6. Upload HTML report
      # always() ensures upload even when tests fail — report is the evidence
      # -----------------------------------------------------------------------
      - name: Upload Playwright HTML report (UI)
        if: always() && steps.portal_check.outputs.reachable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30

      # -----------------------------------------------------------------------
      # 7. Upload JUnit XML results (one file per browser)
      # Allows GitHub to surface per-test results natively in the PR checks UI
      # -----------------------------------------------------------------------
      - name: Upload JUnit test results (UI)
        if: always() && steps.portal_check.outputs.reachable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: test-results/
          retention-days: 30

      # -----------------------------------------------------------------------
      # 8. Upload screenshots and videos (evidence for failed tests)
      # -----------------------------------------------------------------------
      - name: Upload screenshots (UI)
        if: always() && steps.portal_check.outputs.reachable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ui
          path: screenshots/
          retention-days: 30

      - name: Upload videos (UI)
        if: always() && steps.portal_check.outputs.reachable == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: videos-ui
          path: videos/
          retention-days: 30
